<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#050810" />
    <title>Lockedin Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #050810;
        color: #f4ecdf;
        font-family: Arial, sans-serif;
        padding: 24px;
      }
      main {
        max-width: 420px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.03);
        border-radius: 24px;
        padding: 28px;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 28px;
      }
      p {
        margin: 0;
        line-height: 1.7;
        color: rgba(244, 236, 223, 0.74);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Connection Required</h1>
      <p>
        Lockedin can open while installed, but funding, withdrawals, admin actions, and protocol
        updates still require a live connection. Reconnect to continue safely.
      </p>
    </main>
  </body>
</html>
